<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call It - Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-row">
          <div class="login-logo-icone">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
          </div>
          <h1 class="login-logo-titulo">Call It</h1>
        </div>
        <p class="login-logo-subtitulo">Sistema de Gerenciamento de Chamados</p>
      </div>



 <form id="form-login" class="login-form" method="POST" action="/login">

        <div class="login-grupo">
          <label for="matricula">Usuário / Matrícula</label>
          <input id="matricula" name="matricula" type="text" class="campo-formulario" placeholder="Digite sua matrícula" required>
        </div>

        <div class="login-grupo">
          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" class="campo-formulario" placeholder="Digite sua senha" required>
        </div>

        {% if erro %}
        <p class="login-erro">{{ erro }}</p>
        {% endif %}

        <button type="submit" class="botao-primario" style="width:100%">
          Entrar
        </button>

      </form>
    </div>
  </div>

</body>
</html>
